/* ============================================================
   Fotosida — komplett fil
   - Egen DB per sida via ?db=name
   - Robust DB-open (hanterar existerande versioner & upgrades)
   - Import/Export, New page, Sort, Add/Edit, Lightbox
   ============================================================ */

/* ---------------- DB name from URL ---------------- */
function getDBName() {
  try {
    const p = new URLSearchParams(location.search);
    const raw = (p.get("db") || "").trim();
    if (!raw) return "FotosidaDB";
    return raw.replace(/\s+/g, "_");
  } catch (e) {
    return "FotosidaDB";
  }
}

/* ---------------- Globals ---------------- */

/* ---------------- Open DB robustly ----------------
   - Tries to open existing DB version first
   - If required stores missing, re-opens with version+1 to create them
*/
async function openDatabaseAuto() {
  if (db) return db;
  const name = getDBName();
  console.log('Öppnar DB:', name);

  // attempt to find existing DB version
  let existingVersion = null;
  try {
    if (indexedDB.databases) {
      const list = await indexedDB.databases();
      const found = list.find(d => d.name === name);
      if (found && found.version) existingVersion = found.version;
    }
  } catch (e) {
    // ignore listing failure
  }

  // helper to perform open with given version (or without a version if null)
  function openWithVersion(v) {
    return new Promise((resolve, reject) => {
      const req = (typeof v === 'number') ? indexedDB.open(name, v) : indexedDB.open(name);
      req.onupgradeneeded = (ev) => {
        const D = ev.target.result;
        console.log('onupgradeneeded for', name, 'version', ev.newVersion);
        if (!D.objectStoreNames.contains('images')) D.createObjectStore('images', { keyPath: 'id' });
        if (!D.objectStoreNames.contains('meta')) {
          const s = D.createObjectStore('meta', { keyPath: 'id' });
          try { s.createIndex('order', 'order', { unique: false }); } catch(e){}
        }
        if (!D.objectStoreNames.contains('persons')) D.createObjectStore('persons', { keyPath: 'id' });
      };
      req.onsuccess = (ev) => {
        db = ev.target.result;
        // When DB is closed by page reload, clear db onclose handlers
        db.onversionchange = () => { db.close(); db = null; };
        resolve(db);
      };
      req.onerror = (ev) => reject(ev.target.error || ev);
    });
  }

  // 1) Try open without forcing a higher version (safe)
  try {
    if (existingVersion == null) {
      // no info: try simple open (creates DB if missing with version 1)
      await openWithVersion(1);
      return db;
    } else {
      // try opening with the existing version
      await openWithVersion(existingVersion);
      // check stores exist
      const haveImages = db.objectStoreNames.contains('images');
      const haveMeta = db.objectStoreNames.contains('meta');
      if (haveImages && haveMeta) return db;
      // if missing, close and upgrade
      db.close();
      db = null;
      await openWithVersion(existingVersion + 1);
      return db;
    }
  } catch (err) {
    // fallback: open without version (let browser decide)
    try {
      await openWithVersion();
      return db;
    } catch (err2) {
      console.error('Kunde inte öppna DB', err, err2);
      throw err2;
    }
  }
}

/* ---------------- txn helper ---------------- */
function txn(storeNames, mode='readonly') {
  if (!db) throw new Error('DB inte initierad');
  if (!Array.isArray(storeNames)) storeNames = [storeNames];
  return db.transaction(storeNames, mode);
}

function nextFrame() {
  return new Promise(res => requestAnimationFrame(() => res()));
}



/* ---------------- blob <-> dataURL ---------------- */
function blobToDataURL(blob) {
  return new Promise((res, rej) => {
    if (!blob) return res(null);
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = () => rej(fr.error);
    fr.readAsDataURL(blob);
  });
}
async function dataURLtoBlob(dataURL) {
  const res = await fetch(dataURL);
  return await res.blob();
}

/* ---------------- robust save helpers ---------------- */
function saveImageBlob(id, blob) {
  return new Promise((resolve, reject) => {
    const t = txn('images', 'readwrite');
    const req = t.objectStore('images').put({ id, blob });
    req.onerror = () => reject(req.error);
    req.onsuccess = () => {
      t.oncomplete = () => resolve();
      t.onerror = () => reject(t.error);
      t.onabort = () => reject(t.error);
    };
  });
}
function saveMeta(meta) {
  return new Promise((resolve, reject) => {
    const t = txn('meta', 'readwrite');
    const req = t.objectStore('meta').put(meta);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => {
      t.oncomplete = () => resolve();
      t.onerror = () => reject(t.error);
      t.onabort = () => reject(t.error);
    };
  });
}



function getAllMeta() {
  return new Promise((res, rej) => {
    const t = txn('meta','readonly');
    const store = t.objectStore('meta');
    const req = store.getAll();   // 🔥 INGET index

    req.onsuccess = () => res(req.result || []);
    req.onerror = () => rej(req.error);
  });
}




function getImageBlob(id) {
  return new Promise((res, rej) => {
    const t = txn('images','readonly');
    const req = t.objectStore('images').get(id);

    req.onsuccess = () => {
      const rec = req.result;
      res(rec && rec.blob instanceof Blob ? rec.blob : null);
    };

    req.onerror = () => rej(req.error);
  });
}

}

  panel.classList.remove('open'); panel.setAttribute('aria-hidden','true');

let id = editingId || (pid + '_' + Date.now());

  if (fileInput.files.length) {
    const file = fileInput.files[0];
    const blob = file; // preserve mime
    await saveImageBlob(id, blob);
  }

  const meta = { id, caption, labels, backLink, order: (editingId ? (await findMetaIndex(id)) : (metaCache.length>0 ? metaCache.length : 0) ) };
  await saveMeta(meta);

  fileInput.value = '';
  document.getElementById('captionInput').value = '';
  document.getElementById('labelInput').value = '';
  document.getElementById('backLinkInput').value = '';

  closePanel();
  await loadAndRender();
}

/* find meta index/order */
async function findMetaIndex(id) {
  const all = await getAllMeta();
  const idx = all.findIndex(m=>m.id===id);
  return idx>=0 ? all[idx].order || idx : all.length;
}

/* delete image + meta */
function deleteImage(id) {
  return new Promise((res, rej) => {
    const t1 = txn('images','readwrite');
    t1.objectStore('images').delete(id);
    t1.oncomplete = () => {
      const t2 = txn('meta','readwrite');
      t2.objectStore('meta').delete(id);
      t2.oncomplete = () => res();
      t2.onerror = ()=> rej(t2.error);
    };
    t1.onerror = ()=> rej(t1.error);
  });
}



async function getAllImagesMap() {
  return new Promise((resolve, reject) => {
    const map = {};
    const t = txn('images', 'readonly');
    const store = t.objectStore('images');
    const req = store.openCursor();

    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) {
        map[cursor.key] = cursor.value.blob;
        cursor.continue();
      } else {
        resolve(map);
      }
    };

    req.onerror = () => reject(req.error);
  });
}

async function autoImportIfEmpty() {
  const meta = await getAllMeta();
  if (meta.length > 0) return;

  const dbName = getDBName();
  try {
    const res = await fetch(`data/${dbName}.json`, { cache: 'no-store' });
    if (!res.ok) return;

    if (!confirm(`Databasen "${dbName}" är tom.\nVill du importera data från JSON?`))
      return;

    const text = await res.text();
    const file = new File([text], `${dbName}.json`, { type: 'application/json' });
    await importAllFile(file);

  } catch (e) {
    console.warn('Auto-import misslyckades eller saknas', e);
  }
}

/* ----------------- Sort modal ---------------- */
const sortModal = document.getElementById('sortModal');
const sortList = document.getElementById('sortList');
function openSortModal() {
  sortList.innerHTML = '';

  metaCache
    .filter(m => !PERSON_ID || m.id.startsWith(PERSON_ID + '_'))
    .sort((a, b) => (a.order ?? 0) - (b.order ?? 0))
    .forEach(m => {

      const li = document.createElement('li');
      li.className = 'sort-item';
      li.draggable = true;
      li.dataset.id = m.id;

      const img = document.createElement('img');

      if (objectUrlCache[m.id]) {
        img.src = objectUrlCache[m.id];
      } else {
        getImageBlob(m.id).then(blob => {

          if (!(blob instanceof Blob)) {
            console.warn('Tar bort trasig bildreferens:', m.id);

            // ta bort från cache
            metaCache = metaCache.filter(x => x.id !== m.id);

            // ta bort från IndexedDB
            const t = txn('meta', 'readwrite');
            t.objectStore('meta').delete(m.id);

            return; // ← viktigt
          }

          img.src = getImageURL(m.id, blob);
          objectUrlCache[m.id] = img.src;
        });
      }

      const txt = document.createElement('div');
      txt.style.flex = '1';
      txt.textContent = m.caption || '(Ingen text)';

      li.appendChild(img);
      li.appendChild(txt);

      addDnDHandlers(li);
      sortList.appendChild(li);
    });

  sortModal.style.display = 'flex';
  sortModal.setAttribute('aria-hidden', 'false');

  document.addEventListener('keydown', sortEscHandler);
  setTimeout(() => document.addEventListener('click', sortOutsideClickHandler), 10);
}

function closeSortModal() {
  sortModal.style.display = 'none';
  sortModal.setAttribute('aria-hidden', 'true');
  document.removeEventListener('keydown', sortEscHandler);
  document.removeEventListener('click', sortOutsideClickHandler);
}

function sortEscHandler(e) {
  if (e.key === 'Escape') closeSortModal();
}

function sortOutsideClickHandler(e) {
  const panel = document.querySelector('#sortModal .panel');
  if (panel && !panel.contains(e.target)) closeSortModal();
}

/* drag & drop */
let dragEl = null;

function addDnDHandlers(li) {
  li.addEventListener('dragstart', e => {
    dragEl = li;
    li.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });

  li.addEventListener('dragend', () => {
    li.classList.remove('dragging');
    dragEl = null;
  });

  li.addEventListener('dragover', e => {
    e.preventDefault();
    const target = e.currentTarget;
    if (!dragEl || target === dragEl) return;

    const rect = target.getBoundingClientRect();
    const after = (e.clientY - rect.top) > rect.height / 2;
    target.parentNode.insertBefore(dragEl, after ? target.nextSibling : target);
  });
}

/* ----------------- Save sort ----------------- */
async function saveSortOrder() {
  const items = Array.from(sortList.children);

  await ensureDB();

  await new Promise((resolve, reject) => {
    const t = txn('meta', 'readwrite');
    const store = t.objectStore('meta');

    items.forEach((li, idx) => {
      const id = li.dataset.id;
      const req = store.get(id);
      req.onsuccess = () => {
        if (req.result) {
          req.result.order = idx;
          store.put(req.result);
        }
      };
    });

    t.oncomplete = resolve;
    t.onerror = () => reject(t.error);
  });

  closeSortModal();

  metaCache = await getAllMeta();
  await loadPhotosForPerson(PERSON_ID);
}
